---
- name: Remove leftover troubleshooting ConfigMap if present
  shell: kubectl delete configmap nvidia-device-plugin-config -n kube-system --ignore-not-found
  changed_when: false

- name: Create nvidia RuntimeClass
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: node.k8s.io/v1
    kind: RuntimeClass
    metadata:
      name: nvidia
    handler: nvidia
    EOF
  register: runtimeclass_apply
  changed_when: '"created" in runtimeclass_apply.stdout or "configured" in runtimeclass_apply.stdout'

- name: Delete existing NVIDIA device plugin DaemonSet to ensure clean state
  shell: kubectl delete daemonset nvidia-device-plugin-daemonset -n kube-system --ignore-not-found
  changed_when: false

- name: Apply NVIDIA device plugin DaemonSet
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: nvidia-device-plugin-daemonset
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          name: nvidia-device-plugin-ds
      updateStrategy:
        type: RollingUpdate
      template:
        metadata:
          labels:
            name: nvidia-device-plugin-ds
        spec:
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          priorityClassName: "system-node-critical"
          runtimeClassName: nvidia
          nodeSelector:
            accelerator: nvidia
          containers:
          - image: nvcr.io/nvidia/k8s-device-plugin:{{ nvidia_device_plugin_version }}
            name: nvidia-device-plugin-ctr
            env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
          volumes:
          - name: device-plugin
            hostPath:
              path: /var/lib/kubelet/device-plugins
    EOF
  register: device_plugin_apply
  changed_when: '"created" in device_plugin_apply.stdout or "configured" in device_plugin_apply.stdout'

- name: Wait for NVIDIA device plugin daemonset to be created
  shell: kubectl get daemonset nvidia-device-plugin-daemonset -n kube-system
  register: daemonset_check
  retries: 10
  delay: 3
  until: daemonset_check.rc == 0
  changed_when: false

- name: Wait for NVIDIA device plugin pods to be ready
  shell: kubectl wait --for=condition=ready pod -l name=nvidia-device-plugin-ds -n kube-system --timeout=300s
  register: device_plugin_ready
  retries: 3
  delay: 10
  until: device_plugin_ready.rc == 0

- name: Verify GPU resources are available
  shell: kubectl get nodes -o=custom-columns="NODE:.metadata.name,GPU:.status.allocatable.nvidia\.com/gpu"
  register: gpu_resources

- name: Display GPU resources
  debug:
    msg: "GPU resources available on nodes: {{ gpu_resources.stdout_lines }}"

- name: Create example GPU pod manifest
  copy:
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: gpu-test-pod
        namespace: default
      spec:
        restartPolicy: Never
        containers:
        - name: gpu-test
          image: nvidia/cuda:12.6.0-base-ubuntu24.04
          command: ["nvidia-smi"]
          resources:
            limits:
              nvidia.com/gpu: 1
        nodeSelector:
          accelerator: nvidia
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
    dest: /tmp/gpu-test-pod.yaml
    mode: '0644'

- name: Display example GPU pod usage
  debug:
    msg: |
      GPU node setup complete! To test GPU functionality, you can run:
      kubectl apply -f /tmp/gpu-test-pod.yaml
      kubectl logs gpu-test-pod

      To schedule workloads on GPU nodes, use:
      nodeSelector:
        accelerator: nvidia

      Or use node affinity:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: accelerator
                operator: In
                values: ["nvidia"]