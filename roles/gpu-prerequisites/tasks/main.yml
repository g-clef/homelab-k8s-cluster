---
- name: Remove NVIDIA repository entries from main sources.list
  lineinfile:
    path: /etc/apt/sources.list
    regexp: '.*developer\.download\.nvidia\.com.*'
    state: absent

- name: Remove NVIDIA Container Toolkit entries from main sources.list
  lineinfile:
    path: /etc/apt/sources.list
    regexp: '.*nvidia\.github\.io/libnvidia-container.*'
    state: absent

- name: Remove all NVIDIA-related repository files
  shell: rm -f /etc/apt/sources.list.d/*cuda* /etc/apt/sources.list.d/*nvidia*

- name: Remove old NVIDIA keyrings
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/cuda-archive-keyring.gpg
    - /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    - /etc/apt/trusted.gpg.d/cuda-archive-keyring.gpg
    - /etc/apt/trusted.gpg.d/nvidia-container-toolkit-keyring.gpg

- name: Update package cache after cleanup
  apt:
    update_cache: yes
  ignore_errors: yes

- name: Install prerequisites for NVIDIA drivers
  apt:
    name:
      - build-essential
      - dkms
      - linux-headers-generic
      - "linux-headers-{{ ansible_kernel }}"
      - curl
      - gnupg
    state: present

- name: Blacklist nouveau driver
  copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      blacklist nouveau
      options nouveau modeset=0
    mode: '0644'
  register: nouveau_blacklist

- name: Update initramfs to apply nouveau blacklist
  command: update-initramfs -u
  when: nouveau_blacklist.changed

- name: Check if nouveau is currently loaded
  command: lsmod
  register: lsmod_output
  changed_when: false

- name: Reboot to unload nouveau before installing NVIDIA driver
  reboot:
    reboot_timeout: 300
  when: nouveau_blacklist.changed or ('nouveau' in lsmod_output.stdout)

- name: Add NVIDIA CUDA repository key
  shell: |
    curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/3bf863cc.pub | gpg --dearmor -o /usr/share/keyrings/cuda-archive-keyring.gpg

- name: Add NVIDIA CUDA repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cuda-archive-keyring.gpg] https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/ /"
    state: present
    filename: cuda
    update_cache: yes

- name: Add NVIDIA Container Toolkit repository key
  shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Get system architecture
  command: dpkg --print-architecture
  register: system_arch
  changed_when: false

- name: Add NVIDIA Container Toolkit repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/{{ system_arch.stdout }} /"
    state: present
    filename: nvidia-container-toolkit
    update_cache: yes

- name: Install NVIDIA driver
  apt:
    name: nvidia-driver-570
    state: present
  register: nvidia_driver_install

- name: Install NVIDIA container toolkit
  apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: yes

- name: Check if nvidia runtime is already configured in containerd
  shell: grep -rq "nvidia-container-runtime" /etc/containerd/ 2>/dev/null
  register: nvidia_runtime_check
  changed_when: false
  failed_when: false

- name: Configure containerd with NVIDIA runtime (adds runtime stanza)
  shell: nvidia-ctk runtime configure --runtime=containerd
  register: nvidia_ctk_configure
  when: nvidia_runtime_check.rc != 0

- name: Set nvidia as the default containerd runtime
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*default_runtime_name\s*='
    line: '      default_runtime_name = "nvidia"'
    backup: yes

- name: Restart containerd to apply NVIDIA runtime configuration
  systemd:
    name: containerd
    state: restarted
    enabled: yes
  when: nvidia_ctk_configure.changed

- name: Reboot system if NVIDIA driver was installed
  reboot:
    reboot_timeout: 300
  when: nvidia_driver_install.changed

- name: Verify nvidia-smi works after driver installation
  command: nvidia-smi
  register: nvidia_smi_check
  changed_when: false
  retries: 3
  delay: 10
  until: nvidia_smi_check.rc == 0

- name: Display nvidia-smi output
  debug:
    msg: "{{ nvidia_smi_check.stdout_lines }}"